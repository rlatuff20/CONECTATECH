<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTATECH | Panel de Control</title>
    <link rel="icon" type="image/png" href="logoCT.png?v=2">
    <style>
        :root { --nike-black: #060606; --nike-gray: #e6f2ff; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--nike-gray); padding: 40px 20px; }
        .box-container { max-width: 500px; margin: 50px auto; background: var(--white); padding: 30px; border-radius: 9px; border: 2px dashed var(--nike-black); }
        .input-group { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #ccc; }
        .btn { padding: 12px; background-color: var(--nike-black); color: white; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .btn-save { background-color: #007bff; }
        .oculto { display: none !important; }
    </style>
</head>
<body>

    <div id="seccion-login" class="box-container">
        <h2>🔐 ACCESO RESTRINGIDO</h2>
        <form id="form-login" class="input-group">
            <input type="text" id="login-usuario" placeholder="Usuario" required>
            <input type="password" id="login-password" placeholder="Contraseña" required>
            <button type="submit" class="btn">Ingresar</button>
        </form>
    </div>

    <div id="seccion-panel" class="box-container oculto">
        <h2>⚙️ PANEL DE CONTROL</h2>
        <form id="form-nuevo-producto" class="input-group">
            <input type="text" id="nuevo-nombre" placeholder="Nombre" required>
            <input type="text" id="nueva-categoria" placeholder="Categoría" required>
            <input type="number" id="nuevo-precio" step="0.01" placeholder="Precio" required>
            <input type="text" id="nueva-img" placeholder="Imagen" required>
            <input type="number" id="nuevo-stock" placeholder="Stock" required>
            <input type="text" id="nuevas-features" placeholder="Características (a,b,c)" required>
            <button type="submit" class="btn btn-save">➕ Guardar Producto</button>
        </form>
        <button onclick="cerrarSesion()" class="btn" style="margin-top:15px; width:100%">🔒 Cerrar Sesión</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("tokenAdmin")) mostrarPanel();
        });

        document.getElementById('form-login').addEventListener('submit', (e) => {
            e.preventDefault();
            fetch('https://tienda-pro-muyy.onrender.com/login', { // AQUI AGREGUÉ LA COMA
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    usuario: document.getElementById('login-usuario').value, 
                    password: document.getElementById('login-password').value 
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.exito) {
                    localStorage.setItem("tokenAdmin", data.token);
                    mostrarPanel();
                } else { alert(data.mensaje); }
            });
        });

        document.getElementById('form-nuevo-producto').addEventListener('submit', (e) => {
            e.preventDefault();
            const producto = {
                name: document.getElementById('nuevo-nombre').value,
                category: document.getElementById('nueva-categoria').value.trim(),
                price: parseFloat(document.getElementById('nuevo-precio').value),
                img: document.getElementById('nueva-img').value,
                stock: parseInt(document.getElementById('nuevo-stock').value),
                features: document.getElementById('nuevas-features').value.split(',')
            };

            fetch('/productos', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': localStorage.getItem("tokenAdmin")
                },
                body: JSON.stringify(producto)
            })
            .then(res => res.json())
            .then(data => { alert(data.mensaje); })
            .catch(err => console.error(err));
        });

        function mostrarPanel() {
            document.getElementById('seccion-login').classList.add('oculto');
            document.getElementById('seccion-panel').classList.remove('oculto');
        }

        function cerrarSesion() {
            localStorage.removeItem("tokenAdmin");
            location.reload();
        }
    </script>
</body>
</html>
